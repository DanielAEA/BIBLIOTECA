<div class="premium-container">
  <div class="premium-header">
    <h2>Gestión de Autores</h2>
    <button class="premium-button" (click)="createAutor()">+ Nuevo Autor</button>
  </div>

  <div class="modal-overlay" *ngIf="showForm" (click)="cancelForm()">
    <div class="modal-container" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>{{ editingAutor ? 'Editar' : 'Crear' }} Autor</h3>
        <button class="close-btn" (click)="cancelForm()">✕</button>
      </div>
      <form (ngSubmit)="saveAutor()" class="premium-form">
        <div class="form-group">
          <label>Nombre:</label>
          <input type="text" [(ngModel)]="autorNombre" name="nombre" required placeholder="Ej. Gabriel García Márquez">
        </div>
        <div class="form-actions">
          <button type="submit" class="premium-button" [disabled]="submitting">
            {{ submitting ? 'Guardando...' : 'Guardar' }}
          </button>
          <button type="button" (click)="cancelForm()" class="premium-button premium-button-danger">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <div *ngIf="loading" class="loading">Cargando autores...</div>

  <div class="premium-card" *ngIf="!loading && autores.length > 0">
    <div class="table-responsive">
      <table class="premium-table large-text">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let a of autores">
            <td>{{ a.id }}</td>
            <td>{{ a.nombre }}</td>
            <td>
              <button class="btn-edit-premium sm" (click)="editAutor(a)">Editar</button>
              <button class="btn-delete-premium sm" (click)="deleteAutor(a)">Eliminar</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div *ngIf="!loading && autores.length === 0" class="no-data">
    No hay autores registrados.
  </div>
</div>
