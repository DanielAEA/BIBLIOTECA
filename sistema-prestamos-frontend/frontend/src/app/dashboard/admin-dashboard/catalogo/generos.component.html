<div class="premium-container">
  <div class="premium-header">
    <h2>Gestión de Géneros</h2>
    <button class="premium-button" (click)="createGenero()">+ Nuevo Género</button>
  </div>

  <div class="modal-overlay" *ngIf="showForm" (click)="cancelForm()">
    <div class="modal-container" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>{{ editingGenero ? 'Editar' : 'Crear' }} Género</h3>
        <button class="close-btn" (click)="cancelForm()">✕</button>
      </div>
      <form (ngSubmit)="saveGenero()" class="premium-form">
        <div class="form-group">
          <label>Nombre:</label>
          <input type="text" [(ngModel)]="generoNombre" name="nombre" required placeholder="Ej. Realismo Mágico">
        </div>
        <div class="form-actions">
          <button type="submit" class="premium-button" [disabled]="submitting">
            {{ submitting ? 'Guardando...' : 'Guardar' }}
          </button>
          <button type="button" (click)="cancelForm()" class="premium-button premium-button-danger">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <div *ngIf="loading" class="loading">Cargando géneros...</div>

  <div class="premium-card" *ngIf="!loading && generos.length > 0">
    <div class="table-responsive">
      <table class="premium-table large-text">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let g of generos">
            <td>{{ g.id }}</td>
            <td>{{ g.nombre }}</td>
            <td>
              <button class="btn-edit-premium sm" (click)="editGenero(g)">Editar</button>
              <button class="btn-delete-premium sm" (click)="deleteGenero(g)">Eliminar</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div *ngIf="!loading && generos.length === 0" class="no-data">
    No hay géneros registrados.
  </div>
</div>
