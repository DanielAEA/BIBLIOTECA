<div class="premium-container">
  <div class="premium-header">
    <h2>Gestión de Ejemplares</h2>
    <button class="premium-button" (click)="createEjemplar()">+ Nuevo Ejemplar</button>
  </div>

  <div *ngIf="showForm && editingEjemplar !== undefined" class="premium-card premium-form">
    <h3>{{ editingEjemplar ? 'Editar' : 'Crear' }} Ejemplar</h3>
    <form (ngSubmit)="saveEjemplar()">
      <div class="form-group">
        <label>Código:</label>
        <input type="text" [(ngModel)]="ejemplarCodigo" name="codigo" required placeholder="Ej. LIB-001">
      </div>
      <div class="form-group">
        <label>Libro:</label>
        <select [(ngModel)]="selectedLibroId" name="libro" required>
          <option [ngValue]="null" disabled>Selecciona un libro</option>
          <option *ngFor="let libro of libros" [ngValue]="libro.id">{{ libro.titulo }}</option>
        </select>
      </div>
      <div class="form-group" style="display: flex; align-items: center; gap: 0.75rem;">
        <input type="checkbox" [(ngModel)]="ejemplarDisponible" name="disponible" id="disponible"
          style="width: 20px; height: 20px; margin: 0;">
        <label for="disponible" style="margin: 0; cursor: pointer;">Disponible para préstamo</label>
      </div>
      <div class="form-actions">
        <button type="submit" class="premium-button" [disabled]="submitting">
          {{ submitting ? 'Guardando...' : 'Guardar' }}
        </button>
        <button type="button" (click)="cancelForm()" class="premium-button premium-button-danger">Cancelar</button>
      </div>
    </form>
  </div>

  <div *ngIf="loading" class="loading">Cargando ejemplares...</div>

  <div class="premium-card" *ngIf="!loading && ejemplares.length > 0">
    <table class="premium-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Código</th>
          <th>Libro</th>
          <th>Disponible</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let e of ejemplares">
          <td>{{ e.id }}</td>
          <td>{{ e.codigo }}</td>
          <td>{{ e.libro.titulo }}</td>
          <td>
            <span class="premium-badge" [ngClass]="e.disponible ? 'badge-success' : 'badge-danger'">
              {{ e.disponible ? 'Disponible' : 'Prestado' }}
            </span>
          </td>
          <td>
            <button class="premium-button premium-button-alt" (click)="editEjemplar(e)">Editar</button>
            <button class="premium-button premium-button-danger" (click)="deleteEjemplar(e)">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="!loading && ejemplares.length === 0" class="no-data">
    No hay ejemplares registrados.
  </div>
</div>
