<div class="dashboard-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="logo.png" alt="SIBU Logo" class="sidebar-logo">
    </div>

    <nav class="menu">
      <p class="menu-label">MENÚ PRINCIPAL</p>
      @for (m of menu; track m.path) {
      <button class="menu-item" [class.active]="isActive(m.path)" (click)="navigateTo(m.path)">
        <span class="menu-text">{{ m.name }}</span>
        <span class="active-indicator"></span>
      </button>
      }
    </nav>

    <div class="sidebar-footer">
      <div class="admin-badge">
        <div class="avatar">A</div>
        <div class="admin-info">
          <span class="name">Administrador</span>
          <span class="role">Acceso total</span>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()" title="Cerrar Sesión">
        <i class="logout-icon">↩</i>
      </button>
    </div>
  </aside>

  <!-- Main Content Wrapper -->
  <div class="main-wrapper">
    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-content">
        <div class="page-info">
          <h1>Panel de Control</h1>
          <p>Gestiona eficientemente los recursos de la biblioteca.</p>
        </div>
        <div class="topbar-actions">
          <button class="theme-toggle-btn" (click)="toggleTheme()" [title]="(themeService.isDarkTheme$ | async) ? 'Modo Claro' : 'Modo Oscuro'">
            <span class="icon">{{ (themeService.isDarkTheme$ | async) ? '☀️' : '🌙' }}</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Content Route Area -->
    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
