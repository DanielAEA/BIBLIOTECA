<div class="sibu-scaled-wrapper">
  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar-coding" [class.open]="!isSidebarCollapsed">
      <div class="logo-details">
        <div class="logo-container" [style.opacity]="!isSidebarCollapsed ? '1' : '0'">
            <img src="logo.png" alt="SIBU Logo" class="sidebar-logo">
        </div>
        <i class='bx bx-menu' id="btn" (click)="toggleSidebar()"></i>
      </div>
      <ul class="nav-list">
        <div class="menu-label">MENÚ PRINCIPAL</div>
        @for (m of menu; track m.path) {
        <li>
          <a [class.active]="isActive(m.path)" (click)="navigateTo(m.path)">
            <i class='bx' [ngClass]="m.icon"></i>
            <span class="links_name">{{ m.name }}</span>
          </a>
          <span class="tooltip">{{ m.name }}</span>
        </li>
        }
        <li class="profile">
          <div class="profile-details">
            <div class="avatar">C</div>
            <div class="name_job">
              <div class="name">Cliente</div>
              <div class="job">Usuario Lector</div>
            </div>
          </div>
          <i class='bx bx-log-out' id="log_out" (click)="logout()" title="Cerrar Sesión"></i>
        </li>
      </ul>
    </aside>

    <!-- Main Content Wrapper -->
    <div class="main-wrapper">
      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-content">
          <div class="page-info">
            <div class="info-text">
              <h1>Panel del Lector</h1>
              <p>Gestiona tus préstamos, reservas y reseñas.</p>
            </div>
          </div>
          <div class="topbar-actions">
            <button class="theme-toggle-btn" (click)="toggleTheme()" [title]="(themeService.isDarkTheme$ | async) ? 'Modo Claro' : 'Modo Oscuro'">
              <span class="icon">{{ (themeService.isDarkTheme$ | async) ? '☀️' : '🌙' }}</span>
            </button>
          </div>
        </div>
      </header>

      <!-- Content Route Area -->
      <main class="content-area">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</div>
