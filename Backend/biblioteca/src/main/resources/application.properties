spring.application.name=biblioteca
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/biblioteca?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=true

# Deshabilitar recursos estáticos para evitar el error "No static resource"
spring.web.resources.add-mappings=false

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Configuración para subida de archivos (PDFs)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Usuarios Iniciales (Configurables vía variables de entorno)
app.admin.email=${ADMIN_EMAIL:admin@bib.com}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.test.email=${TEST_EMAIL:prueba@bib.com}
app.test.password=${TEST_PASSWORD:prueba123}
